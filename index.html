<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Abistreiche Voting</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="header-left">
      <a href="/" class="back-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="15 18 9 12 15 6"/></svg>
        AbiHub
      </a>
      <div class="header-divider"></div>
      <div class="header-title">🎭 Abistreiche Voting</div>
    </div>
  </header>

  <div class="page-wrap">

    <div class="page-heading">
      <h1>Abistreiche</h1>
      <p>Schlage Abistreiche vor und stimme für die besten ab.</p>
    </div>

    <!-- LINKE SPALTE -->
    <div>

      <div class="card">
        <div class="card-header"><h2>Neuen Streich vorschlagen</h2></div>
        <div class="card-body">
          <textarea id="betreff" placeholder="Überschrift eingeben..."></textarea>
          <textarea id="text" placeholder="Beschreibung..."></textarea>
          <button class="save" id="saveBTN" onclick="saveEntry()">Vorschlag einreichen</button>
        </div>
      </div>

      <div class="card">
        <div class="card-header"><h2>Login</h2></div>
        <div class="card-body">
          <input type="text" placeholder="Nutzer eingeben" id="userInput" class="notwrong">
          <input type="password" placeholder="Passwort eingeben..." id="passInput" class="notwrong">
          <button id="loginBtn" onclick="login()">Login</button>
          <div class="welcome noLogin" id="loggedUser">
            <p id="logUser"></p>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-header"><h2>Gespeicherte Abistreiche</h2></div>
        <div class="card-body">
          <div id="entries"></div>
        </div>
      </div>

    </div>

    <!-- RECHTE SPALTE -->
    <div class="votingCon">
      <div class="card">
        <div class="card-header"><h2>Abstimmung</h2></div>
        <div class="card-body">
          <textarea readonly id="showDes"></textarea>
          <div class="voting">
            <button class="voteBtn good" onclick="voteGood()">👍 Dafür</button>
            <button class="voteBtn bad" onclick="voteBad()">👎 Dagegen</button>
          </div>
        </div>
      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
